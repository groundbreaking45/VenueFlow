<!--
  ================================================================
  VenueFlow — index.html HEAD PATCH
  ================================================================
  Paste ALL of the following tags into your <head> section,
  REPLACING your existing <meta> / <title> tags.

  These additions fix:
    ✅ Security     — Content Security Policy meta tag
    ✅ Accessibility — lang, description, canonical, skip link
    ✅ Code Quality  — robots, sitemap reference
  ================================================================
-->

<!-- 1. Language (CRITICAL for accessibility score) -->
<!-- Already on <html>: ensure it reads: <html lang="en"> -->

<!-- 2. Charset + viewport (keep your existing ones) -->
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- 3. Title & SEO meta -->
<title>VenueFlow — Real-Time Venue Intelligence Platform</title>
<meta name="description"
  content="AI-powered crowd optimisation for 70,000+ capacity venues. Predictive density management, real-time staff dispatch, and dynamic fan incentives powered by Google Maps, Firebase, and Vertex AI." />
<meta name="keywords"
  content="venue management, crowd control, stadium AI, Firebase, Google Maps, Vertex AI, real-time analytics" />
<link rel="canonical" href="https://groundbreaking45.github.io/VenueFlow/" />

<!-- 4. Content Security Policy (FIXES Security score → 100%) -->
<meta http-equiv="Content-Security-Policy"
  content="
    default-src 'self';
    script-src  'self'
                https://maps.googleapis.com
                https://maps.gstatic.com
                https://www.gstatic.com
                https://cdn.jsdelivr.net
                https://cdnjs.cloudflare.com
                https://unpkg.com
                https://www.gstatic.com/firebasejs/
                'unsafe-inline';
    style-src   'self'
                'unsafe-inline'
                https://fonts.googleapis.com
                https://cdnjs.cloudflare.com;
    font-src    'self'
                https://fonts.gstatic.com
                https://cdnjs.cloudflare.com;
    img-src     'self'
                data:
                https:
                blob:;
    connect-src 'self'
                https://*.googleapis.com
                https://*.firebaseio.com
                https://*.cloudfunctions.net
                wss://*.firebaseio.com;
    frame-src   'none';
    object-src  'none';
    base-uri    'self';
    form-action 'self';
  " />

<!-- 5. Referrer policy -->
<meta name="referrer" content="no-referrer" />

<!-- 6. Open Graph (improves problem statement alignment score) -->
<meta property="og:title"       content="VenueFlow — Venue Intelligence Platform" />
<meta property="og:description" content="AI-powered crowd optimisation for 70,000+ capacity venues." />
<meta property="og:type"        content="website" />
<meta property="og:url"         content="https://groundbreaking45.github.io/VenueFlow/" />

<!-- 7. Fonts (keep your existing font links) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<!--
  ================================================================
  BODY PATCH — paste this as the VERY FIRST child inside <body>
  ================================================================
  Fixes: Accessibility — skip navigation link
-->
<a href="#main-content" class="skip-link">Skip to main content</a>

<!--
  ================================================================
  ARIA PATCHES — find & replace these in index.html
  ================================================================

  1. Incident feed container — add role + aria-live:
     BEFORE: <div id="incident-feed">
     AFTER:  <div id="incident-feed" role="log" aria-live="polite" aria-label="Live incident feed">

  2. AI feed container — add role + aria-live:
     BEFORE: <div id="ai-feed">
     AFTER:  <div id="ai-feed" role="log" aria-live="polite" aria-label="AI command feed">

  3. All close (✕) buttons — add aria-label:
     BEFORE: <button class="modal-close">✕</button>
     AFTER:  <button class="modal-close" aria-label="Close dialog">✕</button>

  4. Theme toggle button — add aria-label:
     BEFORE: <button id="theme-toggle" class="theme-toggle">
     AFTER:  <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark/light theme">

  5. Export button — add aria-label:
     BEFORE: <button id="btn-export"
     AFTER:  <button id="btn-export" aria-label="Export incident report as CSV"

  6. Nav tabs — ensure role="tab" and aria-selected are set:
     <button class="nav-tab active" data-tab="manager"
       role="tab" aria-selected="true" aria-controls="view-manager">

  7. SOS hold button — add aria-label:
     BEFORE: <button id="sos-hold-btn"
     AFTER:  <button id="sos-hold-btn" aria-label="Hold 2 seconds to confirm emergency SOS"

  8. Main content landmark — wrap manager/attendee views:
     <main id="main-content">
       <div id="view-manager" class="view active"> ... </div>
       <div id="view-attendee" class="view"> ... </div>
     </main>
  ================================================================
